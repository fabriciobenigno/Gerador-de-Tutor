<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Projetos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#004aad,#007bff);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  color:#fff;
}
.container{
  background:#ffffff15;
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:12px;
  width:100%;
  max-width:600px;
}
h1{text-align:center;margin-bottom:25px}
input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:none;
  border-radius:6px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#fff;
  color:#004aad;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>
<body>

<div class="container">
<h1>Gerador de Projeto</h1>

<input type="text" id="nomeTutor" placeholder="Nome do Tutor">
<input type="text" id="whatsapp" placeholder="Link completo do WhatsApp">
<input type="text" id="instagram" placeholder="Link completo do Instagram">
<input type="text" id="appscript" placeholder="URL completa do App Script">
<input type="text" id="planilha" placeholder="ID da Planilha">
<input type="text" id="gmail" placeholder="Gmail para receber notificações">
<input type="file" id="foto" accept="image/*">

<button onclick="gerarProjeto()">Gerar Projeto.zip</button>
</div>

<script>
async function gerarProjeto(){

const nomeTutor = document.getElementById("nomeTutor").value.trim();
const whatsapp = document.getElementById("whatsapp").value.trim();
const instagram = document.getElementById("instagram").value.trim();
const appscript = document.getElementById("appscript").value.trim();
const planilha = document.getElementById("planilha").value.trim();
const gmail = document.getElementById("gmail").value.trim();
const fotoInput = document.getElementById("foto");

if(!nomeTutor || !whatsapp || !instagram || !appscript || !planilha || !gmail || !fotoInput.files[0]){
alert("Preencha todos os campos.");
return;
}

const zip = new JSZip();

async function fetchText(file){
const r = await fetch("modelo-base/"+file);
if(!r.ok) throw new Error("Erro ao carregar "+file);
return await r.text();
}

async function fetchBlob(file){
const r = await fetch("modelo-base/"+file);
if(!r.ok) throw new Error("Erro ao carregar "+file);
return await r.blob();
}

try{

/* ===========================
   PADRÃO DE NOME DA FOTO
=========================== */
const novoNomeFoto = nomeTutor
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/\s+/g,"-") + ".jpg";

/* ===========================
   INDEX.HTML
=========================== */
let indexHtml = await fetchText("index.html");

// Nome tutor
indexHtml = indexHtml.replace(
/<div class="tutor-name">.*?<\/div>/,
`<div class="tutor-name">${nomeTutor}</div>`
);

// Foto tutor
indexHtml = indexHtml.replace(
/<img class="tutor-photo" src=".*?">/,
`<img class="tutor-photo" src="${novoNomeFoto}">`
);

// WhatsApp
indexHtml = indexHtml.replace(
/href="https:\/\/wa\.me\/[^"]*"/,
`href="${whatsapp}"`
);

// Instagram (botão + redirect)
indexHtml = indexHtml.replace(
/https:\/\/instagram\.com\/[^\"]+/g,
instagram
);

// App Script
indexHtml = indexHtml.replace(
/const WEB_APP_URL = ".*?";/,
`const WEB_APP_URL = "${appscript}";`
);

zip.file("index.html", indexHtml);

/* ===========================
   INDEX2.HTML
=========================== */
let index2Html = await fetchText("index2.html");

// App Script
index2Html = index2Html.replace(
/const WEB_APP_URL=".*?";/,
`const WEB_APP_URL="${appscript}";`
);

// Nome tutor template
index2Html = index2Html.replace(
/TUTOR:.*?🥷/,
`TUTOR:${nomeTutor} 🥷`
);

zip.folder("painel").file("index2.html", index2Html);

/* ===========================
   APPSCRIPT.TXT
=========================== */
let appscriptTxt = await fetchText("appscript.txt");

// ID planilha
appscriptTxt = appscriptTxt.replace(
/const ID_PLANILHA = ".*?";/,
`const ID_PLANILHA = "${planilha}";`
);

// Gmail
appscriptTxt = appscriptTxt.replace(
/to:\s*".*?"/,
`to: "${gmail}"`
);

zip.file("appscript.txt", appscriptTxt);

/* ===========================
   ARQUIVOS FIXOS RAIZ
=========================== */
const arquivosRaiz = [
"simbolo.png",
"icone.ico",
"whatsapp.ico",
"instagram.ico",
"confetes.mp4"
];

for(const file of arquivosRaiz){
zip.file(file, await fetchBlob(file));
}

/* ===========================
   ARQUIVOS PAINEL
=========================== */
const arquivosPainel = ["manifest.json","sw.js"];

for(const file of arquivosPainel){
zip.folder("painel").file(file, await fetchBlob(file));
}

/* ===========================
   FOTO
=========================== */
zip.file(novoNomeFoto, fotoInput.files[0]);

/* ===========================
   GERAR ZIP
=========================== */
const content = await zip.generateAsync({type:"blob"});
saveAs(content,"Projeto.zip");

alert("Projeto gerado com sucesso!");

}catch(erro){
console.error(erro);
alert("Erro ao gerar projeto.");
}

}
</script>

</body>
</html>
