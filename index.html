<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Projeto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}
input{
padding:10px;
margin:8px;
width:320px;
border-radius:8px;
border:none;
}
button{
padding:12px 20px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}
.box{
background:#1e293b;
padding:25px;
border-radius:15px;
display:inline-block;
}
</style>
</head>
<body>

<div class="box">
<h2>Gerador de Projeto</h2>

<input id="projeto" placeholder="Nome do Projeto"><br>
<input id="tutor" placeholder="Nome do Tutor"><br>
<input id="whats" placeholder="Link WhatsApp"><br>
<input id="insta" placeholder="Link Instagram"><br>
<input id="appurl" placeholder="URL App Script"><br>
<input id="sheetid" placeholder="ID da Planilha"><br><br>

<label>Foto do Tutor:</label><br>
<input type="file" id="foto" accept="image/*"><br><br>

<button onclick="gerar()">GERAR PROJETO</button>
</div>

<script>
async function gerar(){

const projeto = document.getElementById("projeto").value.trim();
const tutor = document.getElementById("tutor").value.trim();
const whats = document.getElementById("whats").value.trim();
const insta = document.getElementById("insta").value.trim();
const appurl = document.getElementById("appurl").value.trim();
const sheetid = document.getElementById("sheetid").value.trim();
const fotoFile = document.getElementById("foto").files[0];

if(!projeto || !tutor){
alert("Preencha Projeto e Tutor");
return;
}

const zip = new JSZip();

async function fetchText(path){
return await fetch(path).then(r=>r.text());
}

async function fetchBlob(path){
return await fetch(path).then(r=>r.blob());
}

let index1 = await fetchText("modelo-base/index.html");
let index2 = await fetchText("modelo-base/index2.html");
let appscript = await fetchText("modelo-base/appscript.txt");

index1 = index1
.replaceAll("{{TUTOR}}", tutor)
.replaceAll("{{WHATS}}", whats)
.replaceAll("{{INSTA}}", insta)
.replaceAll("{{APPURL}}", appurl)
.replaceAll("{{FOTO}}", tutor.replace(/\s+/g,'-').toLowerCase()+".jpg");

index2 = index2
.replaceAll("{{APPURL}}", appurl)
.replaceAll("{{SHEETID}}", sheetid);

appscript = appscript
.replaceAll("{{GMAIL}}","seuemail@gmail.com")
.replaceAll("{{APPURL}}",appurl)
.replaceAll("{{SHEETID}}",sheetid);

zip.file("index.html", index1);

const painel = zip.folder("painel");
painel.file("index2.html", index2);
painel.file("manifest.json", await fetchText("modelo-base/manifest.json"));
painel.file("sw.js", await fetchText("modelo-base/sw.js"));

zip.file("appscript.txt", appscript);

const arquivos = [
"simbolo.png",
"icone.ico",
"whatsapp.ico",
"instagram.ico",
"confetes.mp4"
];

for(let arq of arquivos){
zip.file(arq, await fetchBlob("modelo-base/"+arq));
}

if(fotoFile){
zip.file(tutor.replace(/\s+/g,'-').toLowerCase()+".jpg", fotoFile);
}else{
zip.file(tutor.replace(/\s+/g,'-').toLowerCase()+".jpg", await fetchBlob("modelo-base/foto-tutor.jpg"));
}

zip.generateAsync({type:"blob"}).then(function(content){
const a = document.createElement("a");
a.href = URL.createObjectURL(content);
a.download = projeto+".zip";
a.click();
});

}
</script>

</body>
</html>
