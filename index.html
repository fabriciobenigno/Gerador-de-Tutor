<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Projetos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0d6efd,#0a58ca);
    color:#fff;
    padding:40px;
}
.container{
    max-width:600px;
    margin:auto;
    background:#ffffff10;
    padding:30px;
    border-radius:12px;
    backdrop-filter: blur(10px);
}
h1{
    text-align:center;
    margin-bottom:30px;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
}
button{
    width:100%;
    padding:12px;
    background:#fff;
    color:#0d6efd;
    font-weight:bold;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<div class="container">
<h1>Gerador de Projeto</h1>

<input type="text" id="nomeTutor" placeholder="Nome do Tutor">
<input type="text" id="whatsapp" placeholder="Link do WhatsApp">
<input type="text" id="instagram" placeholder="Link do Instagram">
<input type="text" id="appscript" placeholder="URL do App Script">
<input type="text" id="planilha" placeholder="ID da Planilha">
<input type="text" id="gmail" placeholder="Gmail">
<input type="file" id="foto" accept="image/*">

<button onclick="gerarProjeto()">Gerar Projeto.zip</button>
</div>

<script>
async function gerarProjeto(){

    const nomeTutor = document.getElementById("nomeTutor").value.trim();
    const whatsapp = document.getElementById("whatsapp").value.trim();
    const instagram = document.getElementById("instagram").value.trim();
    const appscript = document.getElementById("appscript").value.trim();
    const planilha = document.getElementById("planilha").value.trim();
    const gmail = document.getElementById("gmail").value.trim();
    const fotoInput = document.getElementById("foto");

    if(!nomeTutor || !whatsapp || !instagram || !appscript || !planilha || !gmail || !fotoInput.files[0]){
        alert("Preencha todos os campos.");
        return;
    }

    const zip = new JSZip();

    // Função fetch base
    async function fetchBase(file){
        const response = await fetch("modelo-base/" + file);
        if(!response.ok) throw new Error("Erro ao carregar " + file);
        return await response.text();
    }

    async function fetchBaseBlob(file){
        const response = await fetch("modelo-base/" + file);
        if(!response.ok) throw new Error("Erro ao carregar " + file);
        return await response.blob();
    }

    try{

        // ===== INDEX.HTML =====
        let indexHtml = await fetchBase("index.html");

        indexHtml = indexHtml
            .replace(/Tutor Responsável:[^<]+/g, "Tutor Responsável: " + nomeTutor)
            .replace(/https:\/\/wa\.me\/[0-9]+/g, whatsapp)
            .replace(/https:\/\/instagram\.com\/[^\"]+/g, instagram)
            .replace(/https:\/\/script\.google\.com\/macros\/s\/[^\"]+/g, appscript)
            .replace(/foto-tutor\.(jpg|png|jpeg)/g, nomeTutor + ".jpg");

        zip.file("index.html", indexHtml);

        // ===== INDEX2.HTML =====
        let index2Html = await fetchBase("index2.html");

        index2Html = index2Html
            .replace(/https:\/\/script\.google\.com\/macros\/s\/[^\"]+/g, appscript)
            .replace(/[A-Za-z0-9_-]{40,}/g, planilha);

        zip.folder("painel").file("index2.html", index2Html);

        // ===== APPSCRIPT.TXT =====
        let appscriptTxt = await fetchBase("appscript.txt");

        appscriptTxt = appscriptTxt
            .replace(/[a-zA-Z0-9._%+-]+@gmail\.com/g, gmail)
            .replace(/https:\/\/script\.google\.com\/macros\/s\/[^\"]+/g, appscript)
            .replace(/[A-Za-z0-9_-]{40,}/g, planilha);

        zip.file("appscript.txt", appscriptTxt);

        // ===== ARQUIVOS FIXOS =====
        const arquivosRaiz = [
            "simbolo.png",
            "icone.ico",
            "whatsapp.ico",
            "instagram.ico",
            "confetes.mp4"
        ];

        for(const file of arquivosRaiz){
            const blob = await fetchBaseBlob(file);
            zip.file(file, blob);
        }

        const arquivosPainel = [
            "manifest.json",
            "sw.js"
        ];

        for(const file of arquivosPainel){
            const blob = await fetchBaseBlob(file);
            zip.folder("painel").file(file, blob);
        }

        // ===== FOTO =====
        const fotoFile = fotoInput.files[0];
        const novaFotoNome = nomeTutor.replace(/\s+/g,"-").toLowerCase() + ".jpg";
        zip.file(novaFotoNome, fotoFile);

        // ===== GERAR ZIP =====
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, "Projeto.zip");

        alert("Projeto gerado com sucesso!");

    }catch(erro){
        console.error(erro);
        alert("Erro ao gerar projeto.");
    }

}
</script>

</body>
</html>
